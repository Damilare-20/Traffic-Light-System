<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Traffic-Light-System </title>
  </head>
  <body
    class="flex flex-col items-center justify-center min-h-screen bg-gray-100 px-4 sm:px-6 lg:px-8"
  >
    <h2 class="text-2xl font-bold mb-4 mr-20">Traffic Light System</h2>

  
    <div class="mb-4 w-full max-w-xs sm:max-w-sm md:max-w-md">
      <label class="block text-lg mb-2"
        >Enter traffic light color (red, yellow, green):</label
      >
      <input type="text" placeholder="Type red, yellow, or green"  id="colorInput" class="border rounded px-3 py-2 mb-4 w-90" /> <br>
      <button
        onclick="checkLight()"
        class="w-full sm:w-auto px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
      >
        Submit
      </button>
    </div>

     <div id="trafficLight" class="hidden w-30 h-30  mt-5 rounded-full border-4 border-black"></div>

    <p id="result" class="mt-4 text-lg font-medium text-center px-4"></p>
    <script src="traffic.js"></script>
  </body>
</html>
